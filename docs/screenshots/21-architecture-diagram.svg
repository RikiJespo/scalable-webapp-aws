<svg viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="780" fill="#f7f9fc"/>

  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#232f3e">
    Scalable Web Application on AWS — Architecture
  </text>

  <!-- Internet -->
  <circle cx="450" cy="80" r="24" fill="#ffffff" stroke="#232f3e" stroke-width="2"/>
  <text x="450" y="85" text-anchor="middle" font-size="12" fill="#232f3e">Internet</text>

  <line x1="450" y1="104" x2="450" y2="140" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <rect x="330" y="140" width="240" height="60" rx="8" fill="#8c4fff" stroke="#5a2ea6" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CloudFront (CDN)</text>
  <text x="450" y="183" text-anchor="middle" font-size="11" fill="#eee">Global edge caching + TLS</text>

  <!-- Split arrows -->
  <line x1="400" y1="200" x2="230" y2="250" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="290" y="220" font-size="11" fill="#555">static assets</text>

  <line x1="500" y1="200" x2="620" y2="250" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="220" font-size="11" fill="#555">dynamic requests</text>

  <!-- S3 -->
  <rect x="110" y="250" width="220" height="70" rx="8" fill="#3f8624" stroke="#2c6119" stroke-width="2"/>
  <text x="220" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="white">S3 Bucket</text>
  <text x="220" y="295" text-anchor="middle" font-size="11" fill="#e5f5e0">riki-webapp-static-assets</text>
  <text x="220" y="309" text-anchor="middle" font-size="10" fill="#e5f5e0">Private — akses via OAC</text>

  <!-- VPC box -->
  <rect x="480" y="250" width="360" height="480" rx="10" fill="none" stroke="#ff9900" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="500" y="270" font-size="12" font-weight="bold" fill="#ff9900">VPC — riki-latihan-vpc-vpc (10.0.0.0/16)</text>

  <!-- ALB -->
  <rect x="560" y="290" width="200" height="60" rx="8" fill="#e07b00" stroke="#a85a00" stroke-width="2"/>
  <text x="660" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application LB</text>
  <text x="660" y="333" text-anchor="middle" font-size="10" fill="#fde9cc">Public subnet · alb-sg</text>

  <line x1="660" y1="350" x2="660" y2="385" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ASG box -->
  <rect x="530" y="385" width="260" height="120" rx="8" fill="#ffffff" stroke="#232f3e" stroke-width="2"/>
  <text x="660" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Auto Scaling Group</text>
  <text x="660" y="419" text-anchor="middle" font-size="10" fill="#555">webapp-asg · multi-AZ · ec2-sg</text>

  <!-- EC2 instances -->
  <rect x="550" y="430" width="90" height="60" rx="6" fill="#ffdca8" stroke="#e07b00" stroke-width="1.5"/>
  <text x="595" y="455" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a4900">EC2</text>
  <text x="595" y="468" text-anchor="middle" font-size="9" fill="#7a4900">AZ-1a</text>

  <rect x="670" y="430" width="90" height="60" rx="6" fill="#ffdca8" stroke="#e07b00" stroke-width="1.5"/>
  <text x="715" y="455" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a4900">EC2</text>
  <text x="715" y="468" text-anchor="middle" font-size="9" fill="#7a4900">AZ-1b</text>

  <line x1="660" y1="505" x2="660" y2="545" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RDS -->
  <rect x="540" y="545" width="240" height="70" rx="8" fill="#2e5fac" stroke="#1c3f75" stroke-width="2"/>
  <text x="660" y="573" text-anchor="middle" font-size="13" font-weight="bold" fill="white">RDS MySQL</text>
  <text x="660" y="590" text-anchor="middle" font-size="10" fill="#d6e3f7">riki-webapp-db · private subnet · rds-sg</text>
  <text x="660" y="603" text-anchor="middle" font-size="9" fill="#d6e3f7">Single-AZ · Port 3306</text>

  <!-- Legend -->
  <rect x="500" y="650" width="340" height="90" rx="8" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="515" y="670" font-size="11" font-weight="bold" fill="#232f3e">Keterangan:</text>
  <text x="515" y="688" font-size="10" fill="#444">• S3 &amp; RDS bersifat PRIVATE (tidak diakses publik langsung)</text>
  <text x="515" y="703" font-size="10" fill="#444">• Akses S3 hanya lewat CloudFront (Origin Access Control)</text>
  <text x="515" y="718" font-size="10" fill="#444">• ALB terima traffic publik di public subnet</text>
  <text x="515" y="733" font-size="10" fill="#444">• EC2 &amp; RDS berada di subnet terpisah, dilindungi Security Group</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#232f3e"/>
    </marker>
  </defs>
</svg>
